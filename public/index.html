<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://js.sentry-cdn.com/826873e71aebddd65b6e798b409d378b.min.js" crossorigin="anonymous"></script>
  <title>tport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <style>
    * {
      touch-action: manipulation;
    }

    :root {
      --bg-primary: #0D1117;
      --bg-secondary: #161B22;
      --bg-tertiary: #21262D;
      --border: #30363D;
      --border-hover: #484F58;
      --text-primary: #C9D1D9;
      --text-secondary: #8B949E;
      --text-muted: #6E7681;
      --accent: #58A6FF;
      --accent-hover: #4090E0;
      --selection: #264F78;
      --green: #238636;
      --green-hover: #2ea043;
      --green-bright: #3FB950;
      --red: #F85149;
      --yellow: #D29922;
      --diff-add-bg: rgba(35, 134, 54, 0.15);
      --diff-del-bg: rgba(248, 81, 73, 0.15);
      --diff-hunk-bg: rgba(88, 166, 255, 0.1);
      --green-badge-bg: rgba(35, 134, 54, 0.2);
      --yellow-badge-bg: rgba(210, 153, 34, 0.2);
      --muted-badge-bg: rgba(139, 148, 158, 0.2);
      --accent-border: rgba(88, 166, 255, 0.3);
      --green-border: rgba(35, 134, 54, 0.4);
      --red-border: rgba(248, 81, 73, 0.4);
      --shadow: rgba(0, 0, 0, 0.4);
      --dot-glow: rgba(35, 134, 54, 0.6);
      --dot-glow-red: rgba(248, 81, 73, 0.6);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #FFFFFF;
        --bg-secondary: #F6F8FA;
        --bg-tertiary: #EEF1F5;
        --border: #D0D7DE;
        --border-hover: #AFB8C1;
        --text-primary: #1F2328;
        --text-secondary: #656D76;
        --text-muted: #8C959F;
        --accent: #0969DA;
        --accent-hover: #0860CA;
        --selection: #B6E3FF;
        --green: #1A7F37;
        --green-hover: #218B3C;
        --green-bright: #1A7F37;
        --red: #CF222E;
        --yellow: #9A6700;
        --diff-add-bg: rgba(26, 127, 55, 0.1);
        --diff-del-bg: rgba(207, 34, 46, 0.1);
        --diff-hunk-bg: rgba(9, 105, 218, 0.08);
        --green-badge-bg: rgba(26, 127, 55, 0.12);
        --yellow-badge-bg: rgba(154, 103, 0, 0.12);
        --muted-badge-bg: rgba(101, 109, 118, 0.12);
        --accent-border: rgba(9, 105, 218, 0.3);
        --green-border: rgba(26, 127, 55, 0.4);
        --red-border: rgba(207, 34, 46, 0.4);
        --shadow: rgba(31, 35, 40, 0.15);
        --dot-glow: rgba(26, 127, 55, 0.5);
        --dot-glow-red: rgba(207, 34, 46, 0.5);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      text-align: center;
      padding: 2rem;
      max-width: 320px;
      width: 100%;
    }

    .login-icon {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .login-box h2 {
      color: var(--text-primary);
      font-size: 1.5rem;
      margin: 0 0 0.25rem;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin: 0 0 1.5rem;
    }

    .login-input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    .login-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
    }

    .login-btn:hover {
      background: var(--accent-hover);
    }

    .app-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top Bar ── */
    .top-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 50;
    }

    .session-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--dot-glow);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-dot.disconnected {
      background: var(--red);
      box-shadow: 0 0 8px var(--dot-glow-red);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .project-selector {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      min-width: 0;
      flex: 1;
    }

    .project-selector:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
    }

    .project-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-icon {
      color: var(--accent);
      flex-shrink: 0;
    }

    .dropdown-icon {
      color: var(--text-secondary);
      font-size: 12px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .icon-btn:hover {
      color: var(--accent);
    }

    /* Settings menu */
    .settings-menu {
      display: none;
      position: absolute;
      top: 52px;
      right: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 100;
      box-shadow: 0 8px 24px var(--shadow);
      min-width: 160px;
    }

    .settings-menu.open {
      display: block;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .settings-item:active {
      background: var(--bg-tertiary);
    }

    .settings-item i {
      color: var(--text-secondary);
      width: 16px;
      text-align: center;
    }

    /* Session dropdown */
    .session-dropdown {
      display: none;
      position: absolute;
      top: 52px;
      left: 16px;
      right: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 100;
      box-shadow: 0 8px 24px var(--shadow);
      max-height: 300px;
      overflow-y: auto;
    }

    .session-dropdown.open {
      display: block;
    }

    .session-option {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--bg-tertiary);
      transition: background 0.2s ease;
    }

    .session-option:hover {
      background: var(--bg-tertiary);
    }

    .session-option:last-child {
      border-bottom: none;
    }

    .session-option-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .session-option-meta {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ── Content Area ── */
    .content-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .view.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Terminal View ── */
    #terminal-container {
      flex: 1;
      padding: 4px;
      background: var(--bg-primary);
      overflow: hidden;
      position: relative;
    }

    .xterm {
      height: 100%;
    }

    /* ── Mobile Terminal ── */
    #mobile-terminal-wrapper {
      display: none;
      flex-direction: column;
      height: 100%;
      background: var(--bg-primary);
    }

    #mobile-terminal-output {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .mobile-input-bar {
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .extra-keys-row {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      gap: 6px;
      padding: 6px 12px;
      white-space: nowrap;
    }

    .extra-keys-row::-webkit-scrollbar {
      display: none;
    }

    .key-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .key-btn:active {
      background: var(--border);
    }

    .key-btn.yes {
      color: var(--green);
      border-color: var(--green-border);
    }

    .key-btn.no {
      color: var(--red);
      border-color: var(--red-border);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 8px;
    }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      color: var(--bg-primary);
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .send-btn:active {
      background: var(--accent-hover);
    }

    .mobile-input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px 14px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      min-width: 0;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      overflow-y: auto;
    }

    .mobile-input:focus {
      border-color: var(--accent);
    }

    /* ── Diffs View ── */
    .diffs-view {
      overflow-y: auto;
      background: var(--bg-primary);
      height: 100%;
    }

    .diff-header {
      padding: 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .branch-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      cursor: pointer;
      position: relative;
    }

    .branch-bar .fa-caret-down {
      font-size: 11px;
      transition: transform 0.2s ease;
    }

    .branch-bar.open .fa-caret-down {
      transform: rotate(180deg);
    }

    .branch-dropdown {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .branch-dropdown.open {
      max-height: 300px;
    }

    .branch-dropdown-inner {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .branch-search {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      width: 100%;
    }

    .branch-search:focus {
      border-color: var(--accent);
    }

    .branch-list {
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .branch-item {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .branch-item:hover {
      background: var(--bg-tertiary);
    }

    .branch-item.current {
      color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
    }

    .branch-item.create {
      color: var(--green-bright);
      font-style: italic;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      max-width: 90%;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--green);
      color: #fff;
    }

    .toast.error {
      background: var(--red);
      color: #fff;
    }

    .diff-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .stat-value {
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-additions {
      color: var(--green);
    }

    .stat-deletions {
      color: var(--red);
    }

    .stat-files {
      color: var(--accent);
    }

    .diff-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .refresh-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .diff-files-list {
      padding: 12px 16px 100px 16px;
    }

    .diff-file-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }

    .diff-file-card:hover {
      border-color: var(--border-hover);
    }

    .diff-file-card.expanded {
      border-color: var(--accent);
    }

    .diff-file-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .diff-file-info {
      flex: 1;
      min-width: 0;
    }

    .diff-file-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .diff-file-status {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .diff-file-changes {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .change-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .additions {
      color: var(--green);
    }

    .deletions {
      color: var(--red);
    }

    .diff-file-content {
      display: none;
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      padding: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      overflow-x: auto;
    }

    .diff-file-card.expanded .diff-file-content {
      display: block;
    }

    .diff-line {
      padding: 2px 12px;
      white-space: pre;
    }

    .diff-line-add {
      background: var(--diff-add-bg);
      color: var(--text-primary);
    }

    .diff-line-del {
      background: var(--diff-del-bg);
      color: var(--text-primary);
    }

    .diff-line-hunk {
      background: var(--diff-hunk-bg);
      color: var(--accent);
    }

    .diff-line-context {
      color: var(--text-secondary);
    }

    .diff-section-header {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .diff-section-header.staged {
      color: var(--green);
    }

    .diff-section-header.unstaged {
      color: var(--yellow);
    }

    .diff-section-header.untracked {
      color: var(--text-secondary);
    }

    .diff-section-header .badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 500;
    }

    .diff-section-header.staged .badge {
      background: var(--green-badge-bg);
    }

    .diff-section-header.unstaged .badge {
      background: var(--yellow-badge-bg);
    }

    .diff-section-header.untracked .badge {
      background: var(--muted-badge-bg);
    }

    .untracked-file {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .untracked-file i {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .stage-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: transparent;
      font-size: 12px;
      transition: all 0.15s ease;
    }

    .stage-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .stage-checkbox:active {
      transform: scale(0.9);
    }

    .commit-section {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .commit-section.open {
      max-height: 200px;
    }

    .commit-section-inner {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .commit-input {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 100%;
    }

    .commit-input:focus {
      border-color: var(--accent);
    }

    .commit-btn {
      background: var(--green);
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
      align-self: flex-end;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .commit-btn:hover {
      background: var(--green-hover);
    }

    .commit-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ── Files View ── */
    .files-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg-primary);
    }

    .files-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      overflow-x: auto;
      white-space: nowrap;
    }

    .breadcrumb-item {
      color: var(--accent);
    }

    .breadcrumb-separator {
      color: var(--border-hover);
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 100px 0;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s ease;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .file-item:hover {
      background: var(--bg-secondary);
    }

    .file-item-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
      font-size: 14px;
    }

    .file-item-icon.folder-icon {
      color: var(--accent);
    }

    .file-item-icon.file-icon {
      color: var(--text-secondary);
    }

    .file-item-icon.ts-icon {
      color: #3178C6;
    }

    .file-item-icon.js-icon {
      color: #F1E05A;
    }

    .file-item-icon.json-icon {
      color: #89E051;
    }

    .file-item-icon.md-icon {
      color: var(--text-primary);
    }

    .file-item-icon.css-icon {
      color: #563D7C;
    }

    .file-item-icon.html-icon {
      color: #E34C26;
    }

    .file-item-details {
      flex: 1;
      min-width: 0;
    }

    .file-item-name {
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .file-item-chevron {
      color: var(--text-secondary);
      font-size: 12px;
      margin-left: auto;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .file-item.expanded .file-item-chevron {
      transform: rotate(90deg);
    }

    .nested-files {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .nested-files.open {
      max-height: 5000px;
    }

    .nested-files .file-item {
      padding-left: 44px;
    }

    .nested-files .nested-files .file-item {
      padding-left: 72px;
    }

      padding-left: 100px;
    }

    /* File viewer */
    .file-viewer {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .file-viewer.active {
      display: flex;
    }

    .file-tree-container.hidden {
      display: none;
    }

    .file-viewer-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

      color: var(--accent);

      font-size: 16px;

    }

      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;

      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;

      white-space: pre-wrap;
      color: var(--text-primary);
      background: var(--bg-primary);

    /* ── Bottom Navigation ── */
    .bottom-nav {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-around;
      flex-shrink: 0;

    .nav-icon {
      font-size: 20px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }

    /* ── Loading ── */

      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

<body>
  <!-- Login overlay (shown when password is required) -->
  <div id="login-overlay" class="login-overlay" style="display:none;">
    <div class="login-box">
      <i class="fas fa-terminal login-icon"></i>
      <h2>tport</h2>
      <p class="login-subtitle">Enter password to access the dashboard</p>
      <form id="login-form" onsubmit="return false;">
        <input type="password" id="login-password" class="login-input" placeholder="Password"
          autocomplete="current-password" autofocus>
        <div id="login-error" class="login-error" style="display:none;">Wrong password</div>
        <button type="submit" class="login-btn" id="login-btn">
          <i class="fas fa-lock"></i> Log in
        </button>
      </form>
    </div>
  </div>

  <div class="app-container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="session-info">
        <div class="status-dot disconnected" id="status-dot"></div>
        <button class="project-selector" id="session-selector" onclick="toggleSessionDropdown()">
          <i class="fas fa-terminal project-icon"></i>
          <span class="project-name" id="session-name">No sessions</span>
          <i class="fas fa-chevron-down dropdown-icon"></i>
        </button>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="notif-btn" onclick="window.toggleNotifications()" aria-label="Notifications">
          <i class="far fa-bell-slash fa-fw" id="notif-icon"></i>
        </button>
        <button class="icon-btn" onclick="toggleSettingsMenu()" aria-label="Settings">
          <i class="fas fa-ellipsis-vertical"></i>
        </button>
      </div>
    </div>

    <!-- Settings Menu -->
    <div class="settings-menu" id="settings-menu">
      <button class="settings-item" onclick="location.reload()">
        <i class="fas fa-rotate-right"></i> Refresh
      </button>
    </div>

    <!-- Session Dropdown -->
    <div class="session-dropdown" id="session-dropdown"></div>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Terminal View -->
      <div class="view active" id="terminal-view">
        <div id="terminal-container"></div>
        <div id="mobile-terminal-wrapper">
          <div id="mobile-terminal-output"></div>
          <div class="mobile-input-bar" id="mobile-input-bar">
            <div class="extra-keys-row">
              <button class="key-btn" onclick="sendRaw('\x1b')">Esc</button>
              <button class="key-btn yes" onclick="sendQuick('y')">y</button>
              <button class="key-btn no" onclick="sendQuick('n')">n</button>
              <button class="key-btn" onclick="sendRaw('\x1b[A')"><i class="fas fa-arrow-up"></i></button>
              <button class="key-btn" onclick="sendRaw('\x1b[B')"><i class="fas fa-arrow-down"></i></button>
              <button class="key-btn" onclick="sendQuick('1')">1</button>
              <button class="key-btn" onclick="sendQuick('2')">2</button>
              <button class="key-btn" onclick="sendQuick('3')">3</button>
              <button class="key-btn" onclick="sendQuick('4')">4</button>
              <button class="key-btn" onclick="sendRaw('\r')">Enter</button>
              <button class="key-btn" onclick="sendRaw('\x1b[Z')">⇧Tab</button>
              <button class="key-btn" onclick="sendRaw('\x03')">Ctrl+C</button>
              <button class="key-btn" onclick="sendRaw('\x1b[D')"><i class="fas fa-arrow-left"></i></button>
              <button class="key-btn" onclick="sendRaw('\x1b[C')"><i class="fas fa-arrow-right"></i></button>
            </div>
            <div class="input-row">
              <textarea class="mobile-input" id="mobile-input" rows="1" placeholder="Type a message..."
                autocomplete="off" autocorrect="off" autocapitalize="off" enterkeyhint="send"></textarea>
              <button class="send-btn" onclick="sendMessage()"><i class="fas fa-check"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Diffs View -->
      <div class="view" id="diffs-view">
        <div class="diffs-view">
          <div class="diff-header">
            <div class="branch-bar" id="branch-bar" onclick="toggleBranchDropdown()">
              <i class="fas fa-code-branch"></i>
              <span id="current-branch">&mdash;</span>
              <i class="fas fa-caret-down"></i>
            </div>
            <div class="diff-stats" id="diff-stats">
              <div class="stat-item">
                <i class="fas fa-file-code stat-files"></i>
                <span class="stat-value" id="stat-files">0 files</span>
              </div>
              <div class="stat-item">
                <span class="stat-value stat-additions" id="stat-additions">+0</span>
              </div>
              <div class="stat-item">
                <span class="stat-value stat-deletions" id="stat-deletions">-0</span>
              </div>
            </div>
            <div class="diff-actions">
              <button class="refresh-btn" onclick="window.doPush()">
                <i class="fas fa-arrow-up"></i> Push
              </button>
              <button class="refresh-btn" onclick="window.doPull()">
                <i class="fas fa-arrow-down"></i> Pull
              </button>
              <button class="refresh-btn" onclick="document.getElementById('commit-section').classList.toggle('open')">
                <i class="fas fa-code-commit"></i> Commit
              </button>
              <button class="refresh-btn" onclick="loadDiffs()">
                <i class="fas fa-sync-alt"></i> Refresh
              </button>
            </div>
          </div>
          <div class="branch-dropdown" id="branch-dropdown">
            <div class="branch-dropdown-inner">
              <input class="branch-search" id="branch-search" type="text" placeholder="Filter or create branch..."
                autocomplete="off" oninput="filterBranches(this.value)">

            </div>
          </div>
          <div class="commit-section" id="commit-section">
            <div class="commit-section-inner">
              <input class="commit-input" id="commit-message" type="text" placeholder="Commit message..."
                autocomplete="off">
              <button class="commit-btn" id="commit-btn" onclick="window.doCommit()">
                <i class="fas fa-check"></i> Commit staged
              </button>
            </div>
          </div>
          <div class="diff-files-list" id="diff-files-list">
            <div class="empty-state">
              <i class="fas fa-code-compare"></i>
              <p>No changes detected</p>
            </div>

        </div>
      </div>

      <!-- Files View -->
      <div class="view" id="files-view">
        <div class="files-view">
          <div class="file-tree-container" id="file-tree-container">
            <div class="files-header">
              <div class="breadcrumb" id="breadcrumb"></div>
            </div>
            <div class="file-list" id="file-list">
              <div class="loading">
                <div class="spinner"></div>
                <p>Loading files...</p>
              </div>
            </div>
          </div>
          <div class="file-viewer" id="file-viewer">
            <div class="file-viewer-header">
              <button class="file-viewer-back" onclick="closeFileViewer()">
                <i class="fas fa-arrow-left"></i>
              </button>
              <span class="file-viewer-name" id="file-viewer-name"></span>
            </div>
            <pre class="file-viewer-content" id="file-viewer-content"></pre>
          </div>
        </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <button class="nav-item active" onclick="switchView('terminal-view', this)">
        <i class="fas fa-terminal nav-icon"></i>
        <span class="nav-label">Terminal</span>
      </button>
      <button class="nav-item" id="nav-diffs" onclick="switchView('diffs-view', this)">
        <i class="fas fa-code-compare nav-icon"></i>
        <span class="nav-label">Diffs</span>
      </button>
      <button class="nav-item" onclick="switchView('files-view', this)">
        <i class="fas fa-folder-tree nav-icon"></i>
        <span class="nav-label">Files</span>
      </button>
    </div>
  </div>

  <script type="module">
    // ── Auth ──
    let authToken = sessionStorage.getItem('tport-auth') || '';
    let authRequired = false;

    async function sha256(text) {
      // crypto.subtle is only available in secure contexts (HTTPS/localhost)
      if (typeof crypto !== 'undefined' && crypto.subtle) {
        const data = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
      }
      // Pure JS SHA-256 fallback for HTTP on local network
      const K = [
        0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
        0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
        0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
        0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
        0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
        0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
        0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
        0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
      ];
      const rr = (v, n) => (v >>> n) | (v << (32 - n));
      const bytes = new TextEncoder().encode(text);
      const len = bytes.length;
      const bits = len * 8;
      const padded = new Uint8Array(Math.ceil((len + 9) / 64) * 64);
      padded.set(bytes);
      padded[len] = 0x80;
      const dv = new DataView(padded.buffer);
      dv.setUint32(padded.length - 4, bits, false);
      let [h0, h1, h2, h3, h4, h5, h6, h7] = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];
      for (let off = 0; off < padded.length; off += 64) {
        const w = new Array(64);
        for (let i = 0; i < 16; i++) w[i] = dv.getUint32(off + i * 4, false);
        for (let i = 16; i < 64; i++) {
          const s0 = rr(w[i - 15], 7) ^ rr(w[i - 15], 18) ^ (w[i - 15] >>> 3);
          const s1 = rr(w[i - 2], 17) ^ rr(w[i - 2], 19) ^ (w[i - 2] >>> 10);
          w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
        }
        let [a, b, c, d, e, f, g, h] = [h0, h1, h2, h3, h4, h5, h6, h7];
        for (let i = 0; i < 64; i++) {
          const S1 = rr(e, 6) ^ rr(e, 11) ^ rr(e, 25);
          const ch = (e & f) ^ (~e & g);
          const t1 = (h + S1 + ch + K[i] + w[i]) | 0;
          const S0 = rr(a, 2) ^ rr(a, 13) ^ rr(a, 22);
          const maj = (a & b) ^ (a & c) ^ (b & c);
          const t2 = (S0 + maj) | 0;
          h = g; g = f; f = e; e = (d + t1) | 0; d = c; c = b; b = a; a = (t1 + t2) | 0;
        }
        h0 = (h0 + a) | 0; h1 = (h1 + b) | 0; h2 = (h2 + c) | 0; h3 = (h3 + d) | 0;
        h4 = (h4 + e) | 0; h5 = (h5 + f) | 0; h6 = (h6 + g) | 0; h7 = (h7 + h) | 0;
      }
      return [h0, h1, h2, h3, h4, h5, h6, h7].map(v => (v >>> 0).toString(16).padStart(8, '0')).join('');
    }

    function authFetch(url, opts = {}) {
      if (authToken) {
        opts.headers = { ...opts.headers, 'X-Tport-Auth': authToken };
      }
      return fetch(url, opts);
    }

    function showLogin() {
      document.getElementById('login-overlay').style.display = 'flex';
      document.querySelector('.app-container').style.display = 'none';
      document.getElementById('login-password').focus();
    }

    function hideLogin() {
      document.getElementById('login-overlay').style.display = 'none';
      document.querySelector('.app-container').style.display = '';
    }

    // Check if auth is required
    {
      const probe = await fetch('/api/sessions');
      if (probe.status === 401) {
        authRequired = true;
        if (!authToken) {
          showLogin();
        } else {
          // Verify stored token
          const verify = await authFetch('/api/sessions');
          if (verify.status === 401) {
            authToken = '';
            sessionStorage.removeItem('tport-auth');
            showLogin();
          }
        }
      }
    }

    document.getElementById('login-form').addEventListener('submit', async () => {
      const input = document.getElementById('login-password');
      const password = input.value;
      if (!password) return;

      const hash = await sha256(password);
      const resp = await fetch('/api/sessions', { headers: { 'X-Tport-Auth': hash } });
      if (resp.status === 401) {
        document.getElementById('login-error').style.display = 'block';
        input.value = '';
        input.focus();
        return;
      }

      authToken = hash;
      sessionStorage.setItem('tport-auth', hash);
      document.getElementById('login-error').style.display = 'none';
      hideLogin();
      connect();
    });

    // ── State ──
    let ws = null;
    let currentSessionId = null;
    let sessions = [];
    let homeDir = '';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // ── Terminal Setup ──
    // Mobile: hidden xterm.js processes ANSI/cursor correctly, we render buffer as plain text
    // Desktop: visible xterm.js as before
    let term = null;
    let fitAddon = null;
    let hiddenTerm = null;
    let mobileRenderTimer = null;
    const mobileOutput = document.getElementById('mobile-terminal-output');

    const { Terminal } = await import('https://cdn.jsdelivr.net/npm/@xterm/xterm@5/+esm');

    if (isMobile) {
      document.getElementById('terminal-container').style.display = 'none';
      document.getElementById('mobile-terminal-wrapper').style.display = 'flex';

      // Hidden xterm.js handles all ANSI sequences, cursor movement, spinners etc.
      // Use 80 cols to match PTY output; CSS pre-wrap handles visual wrapping
      hiddenTerm = new Terminal({ cols: 80, rows: 24, scrollback: 5000 });
      const hiddenDiv = document.createElement('div');
      hiddenDiv.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden';
      document.body.appendChild(hiddenDiv);
      hiddenTerm.open(hiddenDiv);
    } else {
      const { FitAddon } = await import('https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/+esm');
      const cs = getComputedStyle(document.documentElement);
      const getVar = (v) => cs.getPropertyValue(v).trim();
      term = new Terminal({
        cursorBlink: true,
        theme: {
          background: getVar('--bg-primary'),
          foreground: getVar('--text-primary'),
          cursor: getVar('--accent'),
          selectionBackground: getVar('--selection'),
        },
        fontSize: 14,
        fontFamily: "'JetBrains Mono', monospace",
        scrollback: 5000,
      });
      fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      term.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN && currentSessionId) {
          ws.send(JSON.stringify({ type: 'input', sessionId: currentSessionId, data }));
        }
      });

      let fitTimer = null;
      function fitTerminal() {
        clearTimeout(fitTimer);
        fitTimer = setTimeout(() => {
          fitAddon.fit();
          // Send resize to PTY only if web terminal is smaller
          if (ws && ws.readyState === WebSocket.OPEN && currentSessionId) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (session) {
              const newCols = Math.min(term.cols, session.cols);
              const newRows = Math.min(term.rows, session.rows);
              if (newCols < session.cols || newRows < session.rows) {
                ws.send(JSON.stringify({ type: 'resize', sessionId: currentSessionId, cols: newCols, rows: newRows }));
              }
            }
          }
        }, 150);
      }
      window.addEventListener('resize', fitTerminal);
      window._fitTerminal = fitTerminal;
    }

    // ── Render hidden xterm buffer with colors (mobile) ──
    const boxDrawingRe = /^[\s─│┌┐└┘├┤┬┴┼╭╮╯╰━║╔╗╚╝╠╣╦╩╬▀▄█▌▐░▒▓╱╲╳⎺⎻⎼⎽◆●►◄▲▼]*$/;

    const ANSI_16 = [
      '#484F58', '#F85149', '#238636', '#D29922', '#58A6FF', '#BC8CFF', '#39D353', '#8B949E',
      '#6E7681', '#FF7B72', '#3FB950', '#E3B341', '#79C0FF', '#D2A8FF', '#56D364', '#C9D1D9'
    ];

    function getCellFg(cell) {
      if (cell.isFgDefault()) return null;
      if (cell.isFgRGB()) {
        const c = cell.getFgColor();
        return `rgb(${(c >> 16) & 0xFF},${(c >> 8) & 0xFF},${c & 0xFF})`;
      }
      const idx = cell.getFgColor();
      if (idx < 16) return ANSI_16[idx];
      if (idx < 232) {
        const i = idx - 16;
        return `rgb(${Math.floor(i / 36) * 51},${Math.floor((i % 36) / 6) * 51},${(i % 6) * 51})`;
      }
      const g = (idx - 232) * 10 + 8;
      return `rgb(${g},${g},${g})`;
    }

    function renderLineHtml(line) {
      // Find last non-space column
      let lastCol = line.length - 1;
      while (lastCol >= 0) {
        const c = line.getCell(lastCol);
        if (c && c.getChars() && c.getChars() !== ' ') break;
        lastCol--;
      }
      if (lastCol < 0) return '';

      let html = '';
      let prevStyle = '';
      let spanOpen = false;

      for (let col = 0; col <= lastCol; col++) {
        const cell = line.getCell(col);
        if (!cell) continue;
        const ch = cell.getChars();
        if (!ch && cell.getWidth() === 0) continue; // wide char continuation
        const displayCh = ch || ' '; // empty cell = space

        let style = '';
        const fg = getCellFg(cell);
        if (fg) style += `color:${fg};`;
        if (cell.isBold()) style += 'font-weight:bold;';
        if (cell.isDim()) style += 'opacity:0.6;';
        if (cell.isItalic()) style += 'font-style:italic;';

        if (style !== prevStyle) {
          if (spanOpen) html += '</span>';
          if (style) {
            html += `<span style="${style}">`;
            spanOpen = true;
          } else {
            spanOpen = false;
          }
          prevStyle = style;
        }

        html += escapeHtml(displayCh);
      }

      if (spanOpen) html += '</span>';
      return html;
    }

    function renderMobileBuffer() {
      const buf = hiddenTerm.buffer.active;
      const htmlLines = [];
      for (let i = 0; i < buf.length; i++) {
        const line = buf.getLine(i);
        if (line) {
          const text = line.translateToString(true);
          if (text && !boxDrawingRe.test(text)) {
            htmlLines.push(renderLineHtml(line));
          }
        }
      }
      while (htmlLines.length > 0 && (htmlLines[htmlLines.length - 1] === '' || htmlLines[htmlLines.length - 1] === undefined)) htmlLines.pop();
      mobileOutput.innerHTML = htmlLines.join('\n');
      mobileOutput.scrollTop = mobileOutput.scrollHeight;
    }

    // ── Write output to terminal (branched) ──
    function writeOutput(data) {
      if (isMobile) {
        hiddenTerm.write(data);
        if (mobileRenderTimer) clearTimeout(mobileRenderTimer);
        mobileRenderTimer = setTimeout(renderMobileBuffer, 80);
      } else {
        term.write(data);
      }
    }

    function clearOutput() {
      if (isMobile) {
        hiddenTerm.reset();
        mobileOutput.innerHTML = '';
      } else {
        term.reset();
      }
    }

    // ── Mobile input ──
    function sendInput(data) {
      if (ws && ws.readyState === WebSocket.OPEN && currentSessionId) {
        ws.send(JSON.stringify({ type: 'input', sessionId: currentSessionId, data }));
      }
    }

    window.sendMessage = function () {
      const input = document.getElementById('mobile-input');
      const text = input.value;
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      sendInput(text);
      setTimeout(() => sendInput('\r'), 50);
    };

    window.sendQuick = function (char) {
      sendInput(char);
      setTimeout(() => sendInput('\r'), 50);
    };

    window.sendRaw = function (data) {
      sendInput(data);
    };

    // Enter key sends message on mobile
    const mobileInput = document.getElementById('mobile-input');
    mobileInput?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        window.sendMessage();
      }
    });
    // Auto-grow textarea
    mobileInput?.addEventListener('input', () => {
      mobileInput.style.height = 'auto';
      mobileInput.style.height = Math.min(mobileInput.scrollHeight, 100) + 'px';
    });

    // ── Notifications ──
    let notificationsEnabled = false;
    let lastNotifTime = 0;
    const NOTIF_COOLDOWN = 5000; // don't spam — 5s between notifications
    const ATTENTION_PATTERNS = [
      /❯\s*$/,                          // Claude prompt waiting for input
      /\(y\/n\)/i,                       // yes/no prompt
      /\(Y\/n\)/,                        // yes/no prompt
      /accept edits/i,                   // accept edits prompt
      /shift\+tab to cycle/i,            // permission prompt
      /Do you want to proceed/i,         // confirmation
      /Press Enter/i,                    // waiting for enter
      /\? \(y\)es/i,                     // git-style prompts
    ];

    // Beep using Web Audio API
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch { }
    }

    function checkForAttention(data) {
      if (!notificationsEnabled) return;
      const now = Date.now();
      if (now - lastNotifTime < NOTIF_COOLDOWN) return;

      // Strip ANSI for pattern matching
      const clean = data
        .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')
        .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, '')
        .replace(/[\x00-\x09\x0B\x0C\x0E-\x1F\x7F]/g, '');

      for (const pattern of ATTENTION_PATTERNS) {
        if (pattern.test(clean)) {
          lastNotifTime = now;
          playBeep();
          if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
            const match = clean.match(pattern)?.[0] || 'Action needed';
            new Notification('tport', { body: match, tag: 'tport-attention' });
          }
          // Vibrate on mobile
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          return;
        }
      }
    }

    window.toggleNotifications = async function () {
      if (!notificationsEnabled) {
        if ('Notification' in window) {
          if (Notification.permission === 'default') {
            const perm = await Notification.requestPermission();
            if (perm !== 'granted') return;
          }
        }
        notificationsEnabled = true;
        const onIcon = document.getElementById('notif-icon');
        onIcon.classList.remove('far', 'fa-bell-slash');
        onIcon.classList.add('fas', 'fa-bell');
        document.getElementById('notif-btn').style.color = 'var(--accent)';
      } else {
        notificationsEnabled = false;
        const offIcon = document.getElementById('notif-icon');
        offIcon.classList.remove('fas', 'fa-bell');
        offIcon.classList.add('far', 'fa-bell-slash');
        document.getElementById('notif-btn').style.color = '';
      }
    };

    // ── WebSocket ──
    function connect() {
      if (authRequired && !authToken) return;
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const tokenParam = authToken ? `?token=${encodeURIComponent(authToken)}` : '';
      ws = new WebSocket(`${proto}//${location.host}/ws${tokenParam}`);

      ws.onopen = () => {
        document.getElementById('status-dot').classList.remove('disconnected');
        // Re-subscribe to restore output after reconnect
        if (currentSessionId) {
          ws.send(JSON.stringify({ type: 'subscribe', sessionId: currentSessionId }));
        }
        loadSessions();
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case 'scrollback':
            clearOutput();
            writeOutput(msg.data);
            break;
          case 'output':
            writeOutput(msg.data);
            checkForAttention(msg.data);
            break;
          case 'session_ended':
            loadSessions();
            break;
          case 'sessions':
            sessions = msg.sessions;
            updateSessionUI();
            if (currentSessionId && !sessions.find(s => s.id === currentSessionId)) {
              currentSessionId = null;
              if (sessions.length > 0) subscribe(sessions[0].id);
              else clearOutput();
            }
            break;
        }
      };

      ws.onclose = () => {
        document.getElementById('status-dot').classList.add('disconnected');
        setTimeout(connect, 2000);
      };
    }

    // ── Sessions ──
    function shortenPath(p) {
      if (homeDir && p.startsWith(homeDir)) return '~' + p.slice(homeDir.length);
      return p;
    }

    async function loadSessions() {
      const [sessResp, cfgResp] = await Promise.all([
        authFetch('/api/sessions'),
        authFetch('/api/config'),
      ]);
      if (sessResp.status === 401) { showLogin(); return; }
      sessions = await sessResp.json();
      if (cfgResp.ok) {
        const cfg = await cfgResp.json();
        homeDir = cfg.home ?? '';
        if (cfg.version) {
          document.title = `tport v${cfg.version}`;
        }
      }
      updateSessionUI();

      if (sessions.length > 0 && !currentSessionId) {
        subscribe(sessions[0].id);
      } else if (currentSessionId && !sessions.find(s => s.id === currentSessionId)) {
        currentSessionId = null;
        if (sessions.length > 0) subscribe(sessions[0].id);
        else clearOutput();
      }
    }

    function updateSessionUI() {
      const nameEl = document.getElementById('session-name');
      const dropdown = document.getElementById('session-dropdown');

      if (sessions.length === 0) {
        nameEl.textContent = 'No sessions';
        dropdown.innerHTML = `
          <div class="session-option"><div class="session-option-name">No active sessions</div></div>
          <div class="session-option" onclick="window._newSession()" style="border-top: 1px solid var(--border);">
            <div class="session-option-name" style="color: var(--accent);"><i class="fas fa-plus" style="margin-right: 6px;"></i>New Terminal</div>
            <div class="session-option-meta">Opens in ~/</div>
          </div>
        `;
        return;
      }

      const current = sessions.find(s => s.id === currentSessionId) || sessions[0];
      nameEl.textContent = `${shortenPath(current.cwd)} (${current.command.split('/').pop()})`;

      const diffsNav = document.getElementById('nav-diffs');
      diffsNav.style.display = current.hasGit ? '' : 'none';

      dropdown.innerHTML = sessions.map(s => `
        <div class="session-option" onclick="window._subscribe('${s.id}')">
          <div class="session-option-name">${shortenPath(s.cwd)} (${s.command.split('/').pop()})</div>
          <div class="session-option-meta">${s.name}</div>
        </div>
      `).join('') + `
        <div class="session-option" onclick="window._newSession()" style="border-top: 1px solid var(--border);">
          <div class="session-option-name" style="color: var(--accent);"><i class="fas fa-plus" style="margin-right: 6px;"></i>New Terminal</div>
          <div class="session-option-meta">Opens in ~/</div>
        </div>
      `;
    }

    function subscribe(sessionId) {
      currentSessionId = sessionId;
      clearOutput();

      // Resize hidden terminal to match actual PTY dimensions
      if (isMobile && hiddenTerm) {
        const session = sessions.find(s => s.id === sessionId);
        if (session && session.cols && session.rows) {
          hiddenTerm.resize(session.cols, session.rows);
        }
      }

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'subscribe', sessionId }));
      }
      if (!isMobile && window._fitTerminal) window._fitTerminal();
      updateSessionUI();
      document.getElementById('session-dropdown').classList.remove('open');

      // Close branch dropdown and reset
      document.getElementById('branch-dropdown').classList.remove('open');
      document.getElementById('branch-bar').classList.remove('open');
      document.getElementById('branch-list').innerHTML = '';
      document.getElementById('branch-search').value = '';
      allBranches = [];
      currentBranchName = '';

      // Refresh active view
      const activeView = document.querySelector('.view.active');
      if (activeView?.id === 'diffs-view') loadDiffs();
      else if (activeView?.id === 'files-view') loadFiles();
    }

    window._subscribe = subscribe;

    window._newSession = async function () {
      document.getElementById('session-dropdown').classList.remove('open');
      const resp = await authFetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      if (!resp.ok) return;
      const session = await resp.json();
      await loadSessions();
      subscribe(session.id);
    };

    // ── Diffs ──
    let diffCardIdx = 0;

    function renderDiffCards(files, staged) {
      return files.map(file => {
        const id = diffCardIdx++;
        const checked = staged ? 'checked' : '';
        return `
        <div class="diff-file-card" id="diff-card-${id}">
          <div class="diff-file-header">
            <div class="stage-checkbox ${checked}" onclick="event.stopPropagation(); window.toggleStage('${escapeHtml(file.name)}', ${staged}, this)">
              <i class="fas fa-check"></i>
            </div>
            <div class="diff-file-info" onclick="document.getElementById('diff-card-${id}').classList.toggle('expanded')">
              <div class="diff-file-name">${escapeHtml(file.name)}</div>
            </div>
            <div class="diff-file-changes" onclick="document.getElementById('diff-card-${id}').classList.toggle('expanded')">
              <span class="change-count additions">+${file.additions}</span>
              <span class="change-count deletions">-${file.deletions}</span>
            </div>
          </div>
          <div class="diff-file-content">${file.lines.map(l => {
          let cls = 'diff-line-context';
          if (l.startsWith('+')) cls = 'diff-line-add';
          else if (l.startsWith('-')) cls = 'diff-line-del';
          else if (l.startsWith('@@')) cls = 'diff-line-hunk';
          return `<div class="diff-line ${cls}">${escapeHtml(l)}</div>`;
        }).join('')}</div>
        </div>`;
      }).join('');
    }

    async function loadDiffs() {
      if (!currentSessionId) return;
      const resp = await authFetch(`/api/diff?session=${currentSessionId}`);
      if (!resp.ok) return;
      const data = await resp.json();

      document.getElementById('current-branch').textContent = data.branch || '—';
      document.getElementById('stat-files').textContent = `${data.stats.files} files`;
      document.getElementById('stat-additions').textContent = `+${data.stats.additions}`;
      document.getElementById('stat-deletions').textContent = `-${data.stats.deletions}`;

      const container = document.getElementById('diff-files-list');
      const stagedFiles = parseDiff(data.staged || '');
      const unstagedFiles = parseDiff(data.unstaged || '');
      const untrackedFiles = data.untracked || [];

      if (!stagedFiles.length && !unstagedFiles.length && !untrackedFiles.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>Working tree clean</p></div>';
        return;
      }

      diffCardIdx = 0;
      let html = '';

      if (stagedFiles.length) {
        html += `<div class="diff-section-header staged"><i class="fas fa-check-circle"></i> Staged <span class="badge">${stagedFiles.length}</span></div>`;
        html += renderDiffCards(stagedFiles, true);
      }

      if (unstagedFiles.length) {
        html += `<div class="diff-section-header unstaged"><i class="fas fa-pen"></i> Modified <span class="badge">${unstagedFiles.length}</span></div>`;
        html += renderDiffCards(unstagedFiles, false);
      }

      if (untrackedFiles.length) {
        html += `<div class="diff-section-header untracked"><i class="fas fa-file-circle-plus"></i> Untracked <span class="badge">${untrackedFiles.length}</span></div>`;
        html += untrackedFiles.map(f => `
          <div class="untracked-file">
            <div class="stage-checkbox" onclick="event.stopPropagation(); window.toggleStage('${escapeHtml(f)}', false, this)">
              <i class="fas fa-check"></i>
            </div>
            ${escapeHtml(f)}
          </div>`).join('');
      }

      container.innerHTML = html;
    }

    function parseDiff(raw) {
      const files = [];
      let current = null;

      for (const line of raw.split('\n')) {
        if (line.startsWith('diff --git')) {
          if (current) files.push(current);
          const match = line.match(/b\/(.+)$/);
          current = { name: match?.[1] || 'unknown', lines: [], additions: 0, deletions: 0 };
        } else if (current) {
          if (line.startsWith('+++') || line.startsWith('---') || line.startsWith('index ')) continue;
          current.lines.push(line);
          if (line.startsWith('+') && !line.startsWith('+++')) current.additions++;
          if (line.startsWith('-') && !line.startsWith('---')) current.deletions++;
        }
      }
      if (current) files.push(current);
      return files;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    window.loadDiffs = loadDiffs;

    window.toggleStage = async function (file, isStaged, el) {
      if (!currentSessionId) return;
      const endpoint = isStaged ? '/api/unstage' : '/api/stage';
      const resp = await authFetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session: currentSessionId, file }),
      });
      if (resp.ok) {
        el.classList.toggle('checked');
        setTimeout(loadDiffs, 300);
      }
    };

    window.doCommit = async function () {
      if (!currentSessionId) return;
      const input = document.getElementById('commit-message');
      const message = input.value.trim();
      if (!message) { input.focus(); return; }
      const btn = document.getElementById('commit-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Committing...';
      try {
        const resp = await authFetch('/api/commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session: currentSessionId, message }),
        });
        if (resp.ok) {
          input.value = '';
          document.getElementById('commit-section').classList.remove('open');
          loadDiffs();
        } else {
          const err = await resp.json();
          showToast(err.error || 'Commit failed', true);
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Commit staged';
      }
    };

    // ── Toast ──
    let toastTimer = null;
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (isError ? 'error' : 'success');
      requestAnimationFrame(() => toast.classList.add('show'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Branch Dropdown ──
    let allBranches = [];
    let currentBranchName = '';

    function toggleBranchDropdown() {
      const dropdown = document.getElementById('branch-dropdown');
      const bar = document.getElementById('branch-bar');
      const isOpen = dropdown.classList.toggle('open');
      bar.classList.toggle('open', isOpen);
      if (isOpen) {
        loadBranches();
        const input = document.getElementById('branch-search');
        input.value = '';
        setTimeout(() => input.focus(), 100);
      }
    }

    async function loadBranches() {
      if (!currentSessionId) return;
      const resp = await authFetch(`/api/branches?session=${currentSessionId}`);
      if (!resp.ok) return;
      const data = await resp.json();
      allBranches = data.branches || [];
      currentBranchName = data.current || '';
      renderBranchList(allBranches);
    }

    function renderBranchList(branches) {
      const list = document.getElementById('branch-list');
      const query = document.getElementById('branch-search').value.trim();
      let html = branches.map(b => {
        const isCurrent = b === currentBranchName;
        return `<div class="branch-item${isCurrent ? ' current' : ''}" onclick="switchBranch('${escapeHtml(b)}')">${isCurrent ? '<i class="fas fa-check"></i>' : '<i class="fas fa-code-branch" style="opacity:0.3"></i>'} ${escapeHtml(b)}</div>`;
      }).join('');

      if (query && !branches.includes(query)) {
        html += `<div class="branch-item create" onclick="createNewBranch('${escapeHtml(query)}')"><i class="fas fa-plus"></i> Create "${escapeHtml(query)}"</div>`;
      }
      list.innerHTML = html || '<div class="branch-item" style="color:var(--text-muted);cursor:default">No branches found</div>';
    }

    function filterBranches(query) {
      query = query.toLowerCase();
      const filtered = allBranches.filter(b => b.toLowerCase().includes(query));
      renderBranchList(filtered);
    }

    async function switchBranch(name) {
      if (!currentSessionId || name === currentBranchName) return;
      const resp = await authFetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session: currentSessionId, branch: name }),
      });
      if (resp.ok) {
        const data = await resp.json();
        document.getElementById('current-branch').textContent = data.current;
        currentBranchName = data.current;
        document.getElementById('branch-dropdown').classList.remove('open');
        document.getElementById('branch-bar').classList.remove('open');
        showToast(`Switched to ${data.current}`);
        loadDiffs();
      } else {
        const err = await resp.json();
        showToast(err.error || 'Checkout failed', true);
      }
    }
    window.switchBranch = switchBranch;
    window.toggleBranchDropdown = toggleBranchDropdown;
    window.filterBranches = filterBranches;
    window.showToast = showToast;

    async function createNewBranch(name) {
      if (!currentSessionId || !name.trim()) return;
      const resp = await authFetch('/api/branch/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session: currentSessionId, branch: name.trim() }),
      });
      if (resp.ok) {
        const data = await resp.json();
        document.getElementById('current-branch').textContent = data.current;
        currentBranchName = data.current;
        document.getElementById('branch-dropdown').classList.remove('open');
        document.getElementById('branch-bar').classList.remove('open');
        document.getElementById('branch-search').value = '';
        showToast(`Created & switched to ${data.current}`);
        loadDiffs();
      } else {
        const err = await resp.json();
        showToast(err.error || 'Create branch failed', true);
      }
    }
    window.createNewBranch = createNewBranch;

    // ── Push / Pull ──
    window.doPush = async function () {
      if (!currentSessionId) return;
      const resp = await authFetch('/api/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session: currentSessionId }),
      });
      if (resp.ok) {
        showToast('Pushed successfully');
      } else {
        const err = await resp.json();
        showToast(err.error || 'Push failed', true);
      }
    };

    window.doPull = async function () {
      if (!currentSessionId) return;
      const resp = await authFetch('/api/pull', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session: currentSessionId }),
      });
      if (resp.ok) {
        showToast('Pulled successfully');
        loadDiffs();
      } else {
        const err = await resp.json();
        showToast(err.error || 'Pull failed', true);
      }
    };

    // ── Files ──
    async function loadFiles() {
      if (!currentSessionId) return;
      const resp = await authFetch(`/api/files?session=${currentSessionId}`);
      if (!resp.ok) return;
      const data = await resp.json();

      const session = sessions.find(s => s.id === currentSessionId);
      const cwd = session?.cwd || '';
      document.getElementById('breadcrumb').innerHTML =
        cwd.split('/').filter(Boolean).slice(-3).map(p =>
          `<span class="breadcrumb-item">${p}</span><span class="breadcrumb-separator">/</span>`
        ).join('');

      document.getElementById('file-list').innerHTML = renderFileTree(data.tree);
    }

    function renderFileTree(entries) {
      if (!entries || entries.length === 0) return '';
      return entries.map(entry => {
        if (entry.type === 'directory') {
          const id = 'dir-' + entry.path.replace(/[^a-z0-9]/gi, '-');
          return `
            <div class="file-item" onclick="toggleFolder('${id}', this); event.stopPropagation();">
              <div class="file-item-icon folder-icon"><i class="fas fa-folder"></i></div>
              <div class="file-item-details">
                <div class="file-item-name">${entry.name}</div>
                <div class="file-item-meta">${entry.children?.length || 0} items</div>
              </div>
              <i class="fas fa-chevron-right file-item-chevron"></i>
            </div>
            <div class="nested-files" id="${id}">
              ${renderFileTree(entry.children)}
            </div>
          `;
        } else {
          const iconClass = getFileIconClass(entry.name);
          const icon = getFileIcon(entry.name);
          const size = formatSize(entry.size || 0);
          return `
            <div class="file-item" onclick="viewFile('${entry.path}', '${entry.name}')">
              <div class="file-item-icon ${iconClass}"><i class="${icon}"></i></div>
              <div class="file-item-details">
                <div class="file-item-name">${entry.name}</div>
                <div class="file-item-meta">${size}</div>
              </div>
            </div>
          `;
        }
      }).join('');
    }

    function getFileIconClass(name) {
      const ext = name.split('.').pop()?.toLowerCase();
      const map = { ts: 'ts-icon', tsx: 'ts-icon', js: 'js-icon', jsx: 'js-icon', json: 'json-icon', md: 'md-icon', css: 'css-icon', html: 'html-icon' };
      return map[ext] || 'file-icon';
    }

    function getFileIcon(name) {
      const ext = name.split('.').pop()?.toLowerCase();
      const map = { ts: 'fab fa-js', tsx: 'fab fa-react', js: 'fab fa-js', jsx: 'fab fa-react', json: 'fas fa-braces', md: 'fab fa-markdown', css: 'fab fa-css3', html: 'fab fa-html5' };
      return map[ext] || 'fas fa-file';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    async function viewFile(filePath, fileName) {
      if (!currentSessionId) return;
      const resp = await authFetch(`/api/file?session=${currentSessionId}&path=${encodeURIComponent(filePath)}`);
      if (!resp.ok) return;
      const data = await resp.json();

      document.getElementById('file-viewer-name').textContent = fileName;
      document.getElementById('file-viewer-content').textContent = data.content;
      document.getElementById('file-tree-container').classList.add('hidden');
      document.getElementById('file-viewer').classList.add('active');
    }

    window.viewFile = viewFile;

    window.closeFileViewer = function () {
      document.getElementById('file-tree-container').classList.remove('hidden');
      document.getElementById('file-viewer').classList.remove('active');
    };

    window.toggleFolder = function (id, el) {
      const nested = document.getElementById(id);
      nested.classList.toggle('open');
      el.classList.toggle('expanded');
    };

    // ── Navigation ──
    window.switchView = function (viewId, navItem) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      navItem.classList.add('active');

      if (viewId === 'terminal-view' && !isMobile && window._fitTerminal) window._fitTerminal();
      if (viewId === 'diffs-view') loadDiffs();
      if (viewId === 'files-view') loadFiles();
    };

    window.toggleSessionDropdown = function () {
      document.getElementById('session-dropdown').classList.toggle('open');
      document.getElementById('settings-menu').classList.remove('open');
    };

    window.toggleSettingsMenu = function () {
      document.getElementById('settings-menu').classList.toggle('open');
      document.getElementById('session-dropdown').classList.remove('open');
    };

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.project-selector') && !e.target.closest('.session-dropdown')) {
        document.getElementById('session-dropdown').classList.remove('open');
      }
      if (!e.target.closest('#notif-btn') && !e.target.closest('.settings-menu') && !e.target.closest('[aria-label="Settings"]')) {
        document.getElementById('settings-menu').classList.remove('open');
      }
    });


    // ── Theme change listener ──
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (term) {
        const s = getComputedStyle(document.documentElement);
        term.options.theme = {
          background: s.getPropertyValue('--bg-primary').trim(),
          foreground: s.getPropertyValue('--text-primary').trim(),
          cursor: s.getPropertyValue('--accent').trim(),
          selectionBackground: s.getPropertyValue('--selection').trim(),
        };
      }
    });

    // ── Init ──
    if (!authRequired || authToken) {
      connect();
    }
  </script>
  <div class="toast" id="toast"></div>
</body>

</html>
