name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-darwin:
    name: Build (darwin-arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build release tarball
        run: npm run build:release -- --platform darwin --arch arm64

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: dist-release/*.tar.gz*

  build-linux:
    name: Build (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build release tarball
        run: npm run build:release -- --platform linux --arch x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist-release/*.tar.gz*

  release:
    name: Create GitHub Release
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: darwin-arm64
          path: dist-release

      - uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: dist-release

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
